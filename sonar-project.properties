# ============================================================
# SonarQube Project Configuration — SpotMe
# ============================================================
# Usage:
#   1. Start SonarQube: docker run -p 9000:9000 sonarqube:community
#   2. Run scan:        sonar-scanner (from project root)
#   3. View results:    http://localhost:9000
# ============================================================

sonar.projectKey=spotme
sonar.projectName=SpotMe AI Fitness App
sonar.projectVersion=1.0.0
sonar.organization=spotme-team

# Source directories (relative to this file)
sonar.sources=src,server
sonar.tests=Testing

# Language
sonar.language=js
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions — skip vendored/generated files and node_modules
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.min.js,\
  **/coverage/**,\
  **/Testing/k6/reports/**,\
  **/pnpm-lock.yaml,\
  **/package-lock.json

# Test file patterns
sonar.test.inclusions=\
  **/*.test.js,\
  **/*.spec.js,\
  **/Testing/**/*.js

# Source encoding
sonar.sourceEncoding=UTF-8

# Security hotspot rules relevant to this stack:
#   - S2068  : Hardcoded passwords/secrets
#   - S5131  : XSS via req.query/params echoed in HTML
#   - S4423  : Weak JWT/session secrets
#   - S5144  : Server-Side Request Forgery (fetch with user input)
#   - S2277  : SQL injection (parameterised queries only)

# Quality Gate thresholds (override via SQ UI):
#   Reliability  : A (0 bugs on new code)
#   Security     : A (0 vulnerabilities)
#   Maintainability: A (<= 5% tech debt ratio)
#   Coverage     : >= 60% on new code
#   Duplication  : <= 3%
